<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2563eb">
  <title>Post</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700&family=Noto+Sans+Tamil:wght@400;600;700&family=Noto+Sans+Telugu:wght@400;600;700&family=Noto+Sans+Kannada:wght@400;600;700&family=Noto+Sans+Malayalam:wght@400;600;700&family=Noto+Sans+Bengali:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script>if(localStorage.getItem('darkMode')==='true')document.documentElement.classList.add('dark-mode')</script>
</head>
<body id="single-post">
  <header>
    <div class="container">
      <h1><a href="/">My Blog</a></h1>
      <div class="header-actions">
        <button id="dark-toggle" class="btn-icon" aria-label="Toggle dark mode"><span class="toggle-icon">☾</span></button>
        <a href="editor.html" class="btn btn-primary" id="new-post-btn" style="display:none">+ New Post</a>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <a href="/" class="back-link">&larr; All Posts</a>
      <div id="post-article" class="post-article">
        <div class="post-header">
          <h1 id="post-title"></h1>
          <p class="post-meta" id="post-date"></p>
          <div class="post-meta-tags">
            <span class="tag" id="post-language"></span>
            <span class="tag" id="post-emotion"></span>
            <span class="tag secondary" id="post-theme"></span>
          </div>
          <div class="post-actions">
            <button id="btn-edit" class="btn btn-secondary" style="display:none">Edit</button>
            <button id="btn-delete" class="btn btn-danger" style="display:none">Delete</button>
          </div>
        </div>
        <div id="post-body" class="post-body"></div>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
