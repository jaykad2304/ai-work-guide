<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2563eb">
  <title>Editor</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700&family=Noto+Sans+Tamil:wght@400;600;700&family=Noto+Sans+Telugu:wght@400;600;700&family=Noto+Sans+Kannada:wght@400;600;700&family=Noto+Sans+Malayalam:wght@400;600;700&family=Noto+Sans+Bengali:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script>if(localStorage.getItem('darkMode')==='true')document.documentElement.classList.add('dark-mode')</script>
</head>
<body id="editor">
  <header>
    <div class="container">
      <h1><a href="/">My Blog</a></h1>
      <div class="header-actions">
        <button id="dark-toggle" class="btn-icon" aria-label="Toggle dark mode"><span class="toggle-icon">☾</span></button>
      </div>
    </div>
  </header>

  <main class="editor-main">
    <div class="editor-container">
      <a href="/" class="back-link">&larr; All Posts</a>
      <div class="editor-grid">
        <!-- Left side: Form -->
        <div class="editor-form-section">
          <h2 id="editor-title">New Post</h2>
          <form id="post-form">
            <div class="form-group">
              <label for="title">Title</label>
              <input type="text" id="title" name="title" placeholder="Enter post title..." required>
            </div>
            <div class="form-group">
              <label for="body">Content</label>
              <textarea id="body" name="body" placeholder="Write your post here..." required></textarea>
            </div>
            <div class="form-group">
              <label for="language">Language</label>
              <select id="language" name="language" required>
                <option value="English">English</option>
                <option value="Hindi">Hindi (हिंदी)</option>
                <option value="Marathi">Marathi (मराठी)</option>
                <option value="Tamil">Tamil (தமிழ்)</option>
                <option value="Telugu">Telugu (తెలుగు)</option>
                <option value="Kannada">Kannada (ಕನ್ನಡ)</option>
                <option value="Gujarati">Gujarati (ગુજરાતી)</option>
                <option value="Punjabi">Punjabi (ਪੰਜਾਬੀ)</option>
                <option value="Malayalam">Malayalam (മലയാളം)</option>
                <option value="Bengali">Bengali (বাংলা)</option>
              </select>
            </div>
            <div class="form-group">
              <label for="emotion">Detected Mood</label>
              <input type="text" id="emotion" name="emotion" placeholder="Detected emotion..." disabled>
            </div>
            <div class="form-group">
              <label>Theme Suggestions</label>
              <div id="theme-options" class="theme-options"></div>
            </div>
            <div class="form-footer">
              <button type="submit" class="btn btn-primary" id="submit-btn">Publish Post</button>
              <a href="/" class="btn btn-secondary">Cancel</a>
            </div>
          </form>
        </div>

        <!-- Right side: Live Preview -->
        <div class="editor-preview-section">
          <h3>Live Preview</h3>
          <div id="preview-card" class="post-preview-card">
            <h1 id="preview-title"></h1>
            <div class="preview-tags">
              <span class="tag" id="preview-language"></span>
              <span class="tag" id="preview-emotion"></span>
              <span class="tag secondary" id="preview-theme"></span>
            </div>
            <div id="preview-body" class="post-body preview-body"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
